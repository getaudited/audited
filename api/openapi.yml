openapi: 3.0.3

info:
  title: audited
  description: API reference for audited API
  termsOfService: https://github.com/firminochangani/audited
  contact:
    email: firmino.changani@gmail.com
  license:
    name: MIT
    url: https://github.com/firminochangani/audited/LICENSE.md
  version: 0.0.1

externalDocs:
  description: https://github.com/firminochangani/audited/README.md
  url: https://github.com/firminochangani/audited

servers:
  - url: http://localhost:8080

paths:
  # Public API
  /v1/events:
    post:
      summary: Create an event
      description: ...
      tags:
        - Public API
      operationId: createEvent
      security:
        - TokenAuth: []
      parameters:
        - $ref: '#/components/parameters/token'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [ source_id, version, actor, targets, context, occurred_at ]
              properties:
                source_id:
                  type: string
                version:
                  type: integer
                actor:
                  type: object
                  required: [ id, type ]
                  properties:
                    id:
                      type: string
                    type:
                      type: string
                    name:
                      type: string
                    metadata:
                      type: object
                      additionalProperties: true
                targets:
                  type: array
                  items:
                    type: object
                    required: [ id, type ]
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      name:
                        type: string
                      metadata:
                        type: object
                        additionalProperties: true
                context:
                  type: object
                  required: [ location ]
                  properties:
                    location:
                      type: string
                    user_agent:
                      type: string
                metadata:
                  type: object
                  additionalProperties: true
                occurred_at:
                  type: string
                  format: date-time
      responses:
        "204":
          description: Event created successfully
        default:
          $ref: "#/components/responses/InternalServerError"

  # Admin API
  /x/v1/sources:
    get:
      summary: List all sources
      description: ...
      tags:
        - Admin API
      operationId: getSources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/pagination_limit'
        - $ref: '#/components/parameters/pagination_page'
      responses:
        "200":
          description: A paginated list of sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceList"
        default:
          $ref: "#/components/responses/InternalServerError"
    post:
      summary: Create a source
      description: ...
      tags:
        - Admin API
      operationId: createSource
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [ name ]
              properties:
                name:
                  type: string
      responses:
        "204":
          description: Source created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        default:
          $ref: "#/components/responses/InternalServerError"
  /x/v1/sources/{source_id}:
    get:
      summary: List all sources
      description: ...
      tags:
        - Admin API
      operationId: getSourceByID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/source_id'
      responses:
        "200":
          description: Return the source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/InternalServerError"
  /x/v1/sources/{source_id}/token:
    post:
      summary: Create source token
      description: ...
      tags:
        - Admin API
      operationId: createSourceToken
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/source_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [ name ]
              properties:
                name:
                  type: string
      responses:
        "204":
          description: Event created successfully
        default:
          $ref: "#/components/responses/InternalServerError"
  /x/v1/sources/{source_id}/token/{token_id}:
    delete:
      summary: Delete token
      description: ...
      tags:
        - Admin API
      operationId: deleteToken
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/source_id'
        - $ref: '#/components/parameters/token_id'
      responses:
        "204":
          description: Token deleted successfully
        default:
          $ref: "#/components/responses/InternalServerError"
  /x/v1/events:
    get:
      summary: Get events
      description: ...
      tags:
        - Admin API
      operationId: getEvents
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/source_id_query'
        - $ref: '#/components/parameters/pagination_cursor'
        - $ref: '#/components/parameters/pagination_limit'
      responses:
        "200":
          description: Event stream using cursor-based pagination.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventStream"
        default:
          $ref: "#/components/responses/InternalServerError"
  /x/v1/event-types:
    get:
      summary: List event types
      description: List event types
      tags:
        - Admin API
      operationId: GetEventTypes
      security:
        - BearerAuth: []
      responses:
        "201":
          description: A list of event types
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventTypeList"
        "400":
          $ref: '#/components/responses/BadRequestError'
        default:
          $ref: "#/components/responses/InternalServerError"
    post:
      summary: Create an event type
      description: Create a new event type
      tags:
        - Admin API
      operationId: CreateEventType
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [ action, target_types, should_validate_metadata_schema ]
              properties:
                action:
                  type: string
                target_types:
                  type: array
                  items:
                    type: string
                should_validate_metadata_schema:
                    type: boolean
                schema:
                  type: string
      responses:
        "201":
          description: The newly created event type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventType"
        "400":
          $ref: '#/components/responses/BadRequestError'
        default:
          $ref: "#/components/responses/InternalServerError"
  /x/v1/event-types/{event_id}/archive:
    post:
      summary: Archive an event
      description: Archive an event
      tags:
        - Admin API
      operationId: ArchiveEventType
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/event_id'
      responses:
        "204":
          description: Event has been archived successfully
        "400":
          $ref: '#/components/responses/BadRequestError'
        default:
          $ref: "#/components/responses/InternalServerError"
  /x/v1/event-types/{event_type_action}:
    get:
      summary: Return the details of an Event Type
      description: Return the details of an Event Type
      tags:
        - Admin API
      operationId: GetEventTypeByID
      parameters:
        - $ref: '#/components/parameters/event_type_action'
      # security:
      # - ApiKeyAuth: [ ]
      responses:
        "200":
          description: The event type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventType"
        "400":
          $ref: '#/components/responses/BadRequestError'
        "404":
          $ref: '#/components/responses/NotFoundError'
        default:
          $ref: "#/components/responses/InternalServerError"

components:
  parameters:
    token:
      name: x-token
      in: header
      required: true
      schema:
        type: string
    event_type_action:
      name: event_type_action
      in: path
      required: true
      schema:
        type: string
    source_id:
      name: source_id
      in: path
      required: true
      schema:
        type: string
    token_id:
      name: token_id
      in: path
      required: true
      schema:
        type: string
    event_id:
      name: event_id
      in: path
      required: true
      schema:
        type: string
    source_id_query:
      name: source_id
      in: query
      required: true
      schema:
        type: string
    pagination_cursor:
      name: cursor
      description: Opaque cursor returned by the previous page. Omit to start from the most recent event.
      in: query
      required: false
      schema:
        type: string
    pagination_limit:
      name: limit
      description: The number of items per page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 15
    pagination_page:
      name: page
      description: The page number
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
  schemas:
    # Event
    Context:
      required: [location]
      properties:
        location:
          type: string
        user_agent:
          type: string
          nullable: true
    Target:
      required: [ id, target_type, name ]
      properties:
        id:
          type: string
        target_type:
          type: string
        name:
          type: string
        metadata:
          type: object
          nullable: true
          additionalProperties: true
    Actor:
      required: [id, actor_type, name]
      properties:
        id:
          type: string
        actor_type:
          type: string
        name:
          type: string
        metadata:
          type: object
          nullable: true
          additionalProperties: true
    Event:
      required: [id, source_id, version, actor, targets, context, occurred_at]
      properties:
        id:
          type: string
        source_id:
          type: string
        version:
          type: integer
        actor:
          $ref: '#/components/schemas/Actor'
        targets:
          type: array
          items:
            $ref: '#/components/schemas/Target'
        context:
          $ref: '#/components/schemas/Context'
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        occurred_at:
          type: string
          format: data-time
    EventStream:
      required: [data, cursor]
      properties:
        cursor:
          required: []
          properties:
            next:
              type: string
              nullable: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Event'
    # Source
    Source:
      type: object
      required: [id, name, created_at, updated_at]
      properties:
        id:
          type: string
          x-order: 1
        name:
          type: string
          x-order: 2
        created_at:
          type: string
          format: date-time
          x-order: 3
        updated_at:
          type: string
          format: date-time
          x-order: 4
    SourceList:
      required: [data, pagination]
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        data:
          type: string
          items:
            $ref: '#/components/schemas/Source'
    # Event type
    EventType:
      required: [id, action, version, target_types, should_validate_metadata_schema, created_at, updated_at]
      properties:
        id:
          type: string
        version:
          type: integer
        action:
          type: string
        target_types:
          type: array
          items:
            type: string
        schema:
          type: string
        should_validate_metadata_schema:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    EventTypeList:
      required: [ data, pagination ]
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        data:
          type: array
          items:
            $ref: '#/components/schemas/EventType'

    # Pagination
    Pagination:
      required: [ total, per_page, current_page, total_pages ]
      properties:
        total:
          type: integer
          x-order: 1
        per_page:
          type: integer
          x-order: 2
        current_page:
          type: integer
          x-order: 3
        total_pages:
          type: integer
          x-order: 4

    # Error
    ErrorSchema:
      type: object
      required: [error, message]
      properties:
        message:
          type: string
          description: A description about the error
        error:
          type: string
          description: Error custom error code such as 'email_in_use'
  responses:
    UnauthorizedError:
      description: "Usually causes by an authentication token missing"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorSchema"
    NotFoundError:
      description: "Resource not found"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorSchema"
    BadRequestError:
      description: "Data validation error"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorSchema"
    InternalServerError:
      description: "A generic error response"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorSchema"
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    TokenAuth:
      type: apiKey
      in: header
      name: x-token

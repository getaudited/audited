services:
  rabbitmq:
    image: heidiks/rabbitmq-delayed-message-exchange:3.9.13-management
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres:
    image: postgres:16.3-alpine
    environment:
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"

  app:
    build: ./misc/tools/reflex
    stop_grace_period: 1s
    environment:
      APP_NAME: service
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    volumes:
      - .:/usr/app
      - ${GOCACHE:-/tmp/go-cache}:/root/.cache/go-build
      - ${GOMODCACHE:-/tmp/go-mod-cache}:/go/pkg/mod

  emulators:
    build: ./misc/tools/reflex
    stop_grace_period: 1s
    environment:
      APP_NAME: emulators
    env_file:
      - ./.env
    ports:
      - "9090:9090"
    volumes:
      - .:/usr/app
      - ${GOCACHE:-/tmp/go-cache}:/root/.cache/go-build
      - ${GOMODCACHE:-/tmp/go-mod-cache}:/go/pkg/mod

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    profiles:
      - dev
    ports:
      - "8090:8080"
    environment:
      - SWAGGER_JSON_URL=http://localhost:8080/openapi.json

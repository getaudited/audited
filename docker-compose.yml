services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      - CLICKHOUSE_PASSWORD=password
    ports:
      - "9000:9000"
      - "8123:8123" # DBeaver uses HTTP instead of TCP, hence exposing this port

  app:
    build: ./misc/tools/reflex
    stop_grace_period: 1s
    environment:
      APP_NAME: service
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    volumes:
      - .:/usr/app
      - ${GOCACHE:-/tmp/go-cache}:/root/.cache/go-build
      - ${GOMODCACHE:-/tmp/go-mod-cache}:/go/pkg/mod

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    profiles:
      - dev
    ports:
      - "8090:8080"
    environment:
      - SWAGGER_JSON_URL=http://localhost:8080/openapi.json

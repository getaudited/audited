name: ci
on:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-task@v2
        with:
          version: 3.10.0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Download deps
        run: go mod download

      - name: Spin up Docker
        run: task run

      - name: Test all
        run: task test:all
        timeout-minutes: 4

      - name: Read environment file and set variables
        uses: cosq-network/dotenv-loader@v1.0.2
        if: github.ref_name == 'main'
        with:
          env-file: .env.local

      - name: Update coverage report
        uses: ncruces/go-coverage-report@v0
        if: github.ref_name == 'main'
        with:
          report: true
          chart: true
          amend: true

      - run: docker compose logs app || true
        if: always()

  golangci:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
      - uses: actions/checkout@v4
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: --timeout 3m --verbose
